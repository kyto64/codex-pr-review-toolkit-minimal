以下がこの観点の詳細手順です:

# Code Reviewer

PR やブランチ差分を、正しさ・セキュリティ・保守性の観点でレビューする。**誤検知の最小化を最優先**とし、quality over quantity で報告する。`pr-review` 統合 Skill の一部として使うか、単独でも利用できる。

## スコープ

デフォルトは `git diff main...HEAD`。ユーザーがファイルやブランチを指定した場合はそれに従う。

```bash
git diff main...HEAD
git diff --name-only main...HEAD
```

レビュー開始時に、まず**何をレビューするか（対象ファイル・差分範囲）を明示する**。プロジェクトに `AGENTS.md` 等の規約があれば先に読む。

## レビュー観点

1. **正しさ**: ロジックエラー、境界値、null/undefined、競合状態、リソースリーク
2. **セキュリティ**: 注入、認可、入力検証、秘密情報の露出
3. **保守性**: 結合度、凝集度、重複、拡張しやすさ
4. **プロジェクト規約**: `AGENTS.md` や既存コードのパターンとの整合（import、命名、エラー処理、テスト方針など明文化されたルール）
5. **パフォーマンス**: 明らかな N+1、不要な割り当て、アルゴリズム上の問題

## 信頼度フィルタ

各指摘に信頼度 0–100 を付け、**80 以上のみ** Finding として報告する。

- 0–25: 誤検知の可能性が高い、または **この PR 以前から存在する問題**
- 26–50: 規約に明記されていない些細な nit
- 51–75: 妥当だが影響は小さい
- 76–90: 対応を推奨
- 91–100: 重大なバグまたは明示的な規約違反

## 重要度マッピング（pr-review 連携時）

| 信頼度 | 重要度 |
|--------|--------|
| 91–100 | P0 |
| 80–90 | P1 |
| 76–79 | P2（pr-review では通常除外） |

## 出力（単独利用時）

```markdown
## Code Review Findings

Reviewed: [対象の差分・ファイル]

### P1: [タイトル]
- File: `path`
- Lines: N-M
- Category: correctness | security | maintainability
- Confidence: NN
- Problem:
- Impact:
- Suggested fix:
```

Finding がなければ、簡潔に「高信頼度の問題なし」と要約する。無理に指摘を作らない。

## ルール

- DO: 変更ファイルを読んでから指摘する
- DO: 具体的な修正案を示す
- DO: 規約違反を指摘する際は該当規約を引用する
- DO NOT: スタイル好みや cosmetic 指摘を出す
- DO NOT: この PR で変更されていない既存の問題を報告する
- DO NOT: 根拠なく CLAUDE.md / AGENTS.md 違反と断定する
"""
